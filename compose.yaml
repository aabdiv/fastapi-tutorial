services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0 --port 8000 --reload
    depends_on:
      - postgres
    ports:
      - 8000:8000
    # env_file:
    #   - .env
    environment:
      - DATABASE_HOSTNAME=postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=12347890
      - DATABASE_NAME=fastapi
      - SECRET_KEY=241b72a87732904f3c22d5e23d218e9ad28056d8312af7175b1cf5b685e08e69
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    volumes:
      - ./:/usr/src/app:ro
  postgres:
    image: postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=12347890
      - POSTGRES_USER=postgres
      - POSTGRES_DB=fastapi
    volumes: 
      - postgres-db:/var/lib/postgresql

volumes:
  postgres-db: